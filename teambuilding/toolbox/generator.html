<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团建方案生成器 - 团建 & 培训游戏库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; color: #1a1a2e; }
    a { text-decoration: none; color: inherit; }

    .hero h1 { font-size: 1.8em; margin-bottom: 8px; }
    .hero p { font-size: 0.95em; opacity: 0.82; max-width: 600px; margin: 0 auto; }
    
    .back-link { display: inline-block; margin-top: 16px; color: #5b8cfe; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
    
    .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
    
    .generator-card { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .generator-card h2 { font-size: 1.2em; margin-bottom: 20px; color: #1a1a2e; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 0.95em; font-weight: 600; margin-bottom: 10px; color: #333; display: block; }
    .form-hint { font-size: 0.82em; color: #888; margin-top: 4px; }
    
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-option { padding: 10px 20px; border: 2px solid #d0d5e0; border-radius: 8px; background: #fff; color: #555; font-size: 0.9em; cursor: pointer; transition: all 0.2s; min-width: 100px; text-align: center; }
    .btn-option:hover { border-color: #5b8cfe; color: #5b8cfe; }
    .btn-option.active { background: #5b8cfe; color: #fff; border-color: #5b8cfe; }
    
    .generate-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #5b8cfe, #3366cc); color: #fff; border: none; border-radius: 8px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 24px; }
    .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(91,140,254,0.3); }
    
    .result-section { display: none; }
    .result-section.show { display: block; }
    
    .timeline { position: relative; padding-left: 30px; margin: 20px 0; }
    .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #5b8cfe; }
    .timeline-item { position: relative; margin-bottom: 20px; }
    .timeline-item::before { content: ''; position: absolute; left: -25px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: #5b8cfe; border: 2px solid #fff; box-shadow: 0 0 0 2px #5b8cfe; }
    .timeline-time { font-size: 0.85em; color: #5b8cfe; font-weight: 600; margin-bottom: 4px; }
    .timeline-content { background: #f8f9fc; border-radius: 8px; padding: 14px 16px; }
    .timeline-content h4 { font-size: 0.95em; margin-bottom: 6px; color: #1a1a2e; }
    .timeline-content p { font-size: 0.85em; color: #666; line-height: 1.6; }
    .timeline-content a { color: #5b8cfe; }
    .timeline-content a:hover { text-decoration: underline; }
    
    .game-card { background: #f8f9fc; border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 3px solid #5b8cfe; }
    .game-card h4 { font-size: 0.95em; margin-bottom: 6px; }
    .game-card h4 a { color: #1a1a2e; }
    .game-card p { font-size: 0.85em; color: #666; line-height: 1.6; }
    .game-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .game-tag { font-size: 0.75em; background: #eef2ff; color: #3366cc; padding: 2px 8px; border-radius: 4px; }
    
    .materials-list { background: #f8f9fc; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .materials-list h4 { font-size: 0.95em; margin-bottom: 10px; color: #1a1a2e; }
    .materials-list ul { list-style: none; padding-left: 0; }
    .materials-list li { font-size: 0.85em; color: #555; padding: 6px 0; border-bottom: 1px solid #eef2ff; display: flex; align-items: center; gap: 8px; }
    .materials-list li:last-child { border-bottom: none; }
    .materials-list li::before { content: '✓'; color: #5b8cfe; font-weight: 700; }
    
    .tips-box { background: #fff9e6; border-left: 3px solid #ffc107; border-radius: 6px; padding: 14px 16px; margin-top: 16px; }
    .tips-box h4 { font-size: 0.9em; margin-bottom: 8px; color: #f57c00; }
    .tips-box ul { list-style: none; padding-left: 0; }
    .tips-box li { font-size: 0.85em; color: #666; padding: 4px 0; padding-left: 20px; position: relative; }
    .tips-box li::before { content: '💡'; position: absolute; left: 0; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin: 16px 0; }
    .stat-item { background: #f8f9fc; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-value { font-size: 1.5em; font-weight: 700; color: #5b8cfe; }
    .stat-label { font-size: 0.8em; color: #888; margin-top: 4px; }
    
    .footer { text-align: center; padding: 32px 20px; color: #888; font-size: 0.85em; }
  </style>
</head>

<div class="hero">

<div class="container">

    </div>

        <button class="btn-option" data-value="fullday" onclick="selectOption(this, 'duration')">全天(6h+)</button>
      </div>
      <div class="form-hint">包含游戏、休息和复盘时间</div>
    </div>
    
    <div class="form-group">
      <label class="form-label">🎯 主要目的</label>

    <button class="generate-btn" onclick="generatePlan()">🚀 生成团建方案</button>
  </div>

      <div class="stats-grid" id="stats-grid"></div>
    </div>
    
    <div class="generator-card">

    </div>

      <h2>🎲 推荐游戏</h2>

    </div>
    
    <div class="generator-card">

      <div class="materials-list">

    <div class="generator-card">
      <h2>💡 教练提示</h2>

    </div>
  </div>
</div>

<div class="footer">
  <p>团建 & 培训游戏库 · <a href="https://github.com/aiworkdb/aiworkdb.github.io">GitHub 仓库</a></p>

function selectOption(btn, type) {
  // 更新按钮样式
  var group = btn.parentElement;
  group.querySelectorAll('.btn-option').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  
  // 保存选择
  userSelections[type] = btn.getAttribute('data-value');
}

function generatePlan() {
  // 验证输入
  if (!userSelections.people || !userSelections.duration || !userSelections.purpose) {
    alert('请完整填写团建需求（人数、时长、目的）');
    return;
  }
  
  // 显示结果区域
  document.getElementById('result-section').classList.add('show');
  
  // 根据选择推荐游戏
  var recommendedGames = recommendGames();
  
  // 生成方案概览
  generateStats(recommendedGames);
  
  // 生成时间安排
  generateTimeline(recommendedGames);
  
  // 生成推荐游戏列表
  generateGameList(recommendedGames);
  
  // 生成物资清单
  generateMaterials(recommendedGames);
  
  // 生成教练提示
  generateTips(recommendedGames);
  
  // 滚动到结果区域
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

function recommendGames() {
  var purpose = userSelections.purpose;
  var people = userSelections.people;
  var duration = userSelections.duration;
  
  // 根据目的筛选游戏
  var categoryFilter = [];
  if (purpose === 'comprehensive') {
    categoryFilter = ['icebreaker', 'communication', 'collaboration', 'trust', 'leadership', 'creativity', 'problem-solving'];
  } else if (purpose === 'icebreaker') {
    categoryFilter = ['icebreaker', 'communication'];
  } else if (purpose === 'communication') {
    categoryFilter = ['communication', 'trust'];
  } else if (purpose === 'collaboration') {
    categoryFilter = ['collaboration', 'creativity', 'problem-solving'];
  } else if (purpose === 'trust') {
    categoryFilter = ['trust', 'communication'];
  } else if (purpose === 'leadership') {
    categoryFilter = ['leadership', 'collaboration'];
  }
  
  // 筛选符合人数和类别的游戏
  var filtered = gamesDB.filter(function(game) {
    var matchPeople = game.people.includes(people) || (people === 'xlarge' && game.people.includes('large'));
    var matchCategory = categoryFilter.includes(game.category);
    return matchPeople && matchCategory;
  });
  
  // 根据时长限制游戏数量
  var maxDuration = 0;
  if (duration === 'short') maxDuration = 50;
  else if (duration === 'medium') maxDuration = 150;
  else if (duration === 'long') maxDuration = 300;
  else maxDuration = 480; // 全天
  
  // 选择游戏组合（不超过总时长）
  var selected = [];
  var totalDuration = 0;
  
  // 优先选择类别匹配度高的游戏
  filtered.sort(function(a, b) {
    var aMatch = categoryFilter[0] === a.category ? 0 : 1;
    var bMatch = categoryFilter[0] === b.category ? 0 : 1;
    return aMatch - bMatch;
  });
  
  // 先选一个破冰游戏（如果是综合或破冰目的）
  if (purpose === 'comprehensive' || purpose === 'icebreaker') {
    var icebreaker = filtered.find(function(g) { return g.category === 'icebreaker'; });
    if (icebreaker && totalDuration + icebreaker.duration <= maxDuration) {
      selected.push(icebreaker);
      totalDuration += icebreaker.duration;
    }
  }
  
  // 再选主要目的的游戏
  for (var i = 0; i < filtered.length && totalDuration < maxDuration - 30; i++) {
    var game = filtered[i];
    if (selected.indexOf(game) === -1 && totalDuration + game.duration <= maxDuration - 15) {
      selected.push(game);
      totalDuration += game.duration;
    }
  }
  
  // 如果还有时间，添加一个轻松的游戏作为结尾
  if (totalDuration < maxDuration - 30) {
    var funGame = gamesDB.find(function(g) {
      return g.category === 'icebreaker' && selected.indexOf(g) === -1 && totalDuration + g.duration <= maxDuration;
    });
    if (funGame) {
      selected.push(funGame);
    }
  }
  
  return selected;
}

function generateStats(games) {
  var totalDuration = games.reduce(function(sum, g) { return sum + g.duration; }, 0);
  var totalMaterials = new Set();
  games.forEach(function(g) {
    g.materials.forEach(function(m) { totalMaterials.add(m); });
  });
  
  var html = '';
  html += '<div class="stat-item"><div class="stat-value">' + games.length + '</div><div class="stat-label">推荐游戏</div></div>';
  html += '<div class="stat-item"><div class="stat-value">' + totalDuration + '分钟</div><div class="stat-label">游戏总时长</div></div>';
  html += '<div class="stat-item"><div class="stat-value">' + totalMaterials.size + '</div><div class="stat-label">种物资</div></div>';
  html += '<div class="stat-item"><div class="stat-value">' + (games.length >= 3 ? '充足' : '适中') + '</div><div class="stat-label">内容丰富度</div></div>';
  
  document.getElementById('stats-grid').innerHTML = html;
}

function generateTimeline(games) {
  var people = userSelections.people;
  var duration = userSelections.duration;
  
  // 计算总时长（分钟）
  var totalGameTime = games.reduce(function(sum, g) { return sum + g.duration; }, 0);
  var totalTime = totalGameTime;
  if (duration === 'short') totalTime = Math.max(totalTime + 15, 50);
  else if (duration === 'medium') totalTime = Math.max(totalTime + 30, 120);
  else if (duration === 'long') totalTime = Math.max(totalTime + 60, 240);
  else totalTime = Math.max(totalTime + 90, 360);
  
  // 生成时间轴
  var html = '';
  var currentTime = 0;
  
  // 开场
  html += '<div class="timeline-item">';
  html += '<div class="timeline-time">第 ' + (currentTime + 5) + ' 分钟</div>';
  html += '<div class="timeline-content">';
  html += '<h4>👋 开场 & 分组</h4>';
  html += '<p>教练自我介绍，说明团建目的和流程。进行分组（建议4-6人一组）。</p>';
  html += '</div></div>';
  currentTime += 10;
  
  // 游戏环节
  games.forEach(function(game, index) {
    var debriefTime = Math.ceil(game.duration * 0.3); // 复盘时间约为游戏时长的30%
    var endTime = currentTime + game.duration + debriefTime;
    
    html += '<div class="timeline-item">';
    html += '<div class="timeline-time">第 ' + (currentTime + 5) + '-' + (endTime + 5) + ' 分钟</div>';
    html += '<div class="timeline-content">';
    html += '<h4>🎮 游戏 ' + (index + 1) + '：<a href="../games/' + game.category + '/' + game.id + '.html" target="_blank">' + game.name + '</a></h4>';
    html += '<p><strong>类别：</strong>' + game.categoryName + ' | <strong>时长：</strong>' + game.durationLabel + '（含' + debriefTime + '分钟复盘）</p>';
    html += '<p>' + game.desc + '</p>';
    html += '</div></div>';
    
    currentTime = endTime;
  });
  
  // 总结
  html += '<div class="timeline-item">';
  html += '<div class="timeline-time">最后 15-20 分钟</div>';
  html += '<div class="timeline-content">';
  html += '<h4>📝 整体复盘 & 总结</h4>';
  html += '<p>使用4F模型进行整体复盘：Facts（事实）→ Feelings（感受）→ Findings（发现）→ Future（未来）。</p>';
  html += '<p>👉 参考<a href="../toolbox/debrief.html" target="_blank">复盘引导框架</a>获取详细话术。</p>';
  html += '</div></div>';
  
  document.getElementById('timeline').innerHTML = html;
}

function generateGameList(games) {
  var html = '';
  
  if (games.length === 0) {
    html = '<p style="color:#888;font-size:0.9em;">未找到完全匹配的游戏，建议调整人数或目的条件。</p>';
  } else {
    games.forEach(function(game, index) {
      html += '<div class="game-card">';
      html += '<h4><span style="color:#5b8cfe;margin-right:8px;">' + (index + 1) + '</span><a href="../games/' + game.category + '/' + game.id + '.html" target="_blank">' + game.name + '</a></h4>';
      html += '<p>' + game.desc + '</p>';
      html += '<div class="game-tags">';
      html += '<span class="game-tag">' + game.categoryName + '</span>';
      html += '<span class="game-tag">⏱️ ' + game.durationLabel + '</span>';
      html += '<span class="game-tag">' + (game.indoor ? '✅ 室内' : '❌ 室内') + '</span>';
      html += '<span class="game-tag">' + (game.outdoor ? '✅ 户外' : '❌ 户外') + '</span>';
      html += '</div></div>';
    });
  }
  
  document.getElementById('recommended-games').innerHTML = html;
}

function generateMaterials(games) {
  var materialsMap = {};
  
  games.forEach(function(game) {
    game.materials.forEach(function(material) {
      if (material !== '无') {
        if (!materialsMap[material]) materialsMap[material] = [];
        materialsMap[material].push(game.name);
      }
    });
  });
  
  var html = '';
  
  if (Object.keys(materialsMap).length === 0) {
    html = '<li>本方案无需特殊物资，即拿即用！</li>';
  } else {
    Object.keys(materialsMap).forEach(function(material) {
      var games = materialsMap[material].join('、');
      html += '<li><strong>' + material + '</strong> <span style="color:#888;font-size:0.9em;">（用于：' + games + '）</span></li>';
    });
  }
  
  document.getElementById('materials-list').innerHTML = html;
}
