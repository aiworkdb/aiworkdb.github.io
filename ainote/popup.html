<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AINote 设置</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <h2>📝 AINote 设置</h2>

    <div class="setting-item">
      <label for="auto-render">自动渲染 .md 文件</label>
      <label class="switch">
        <input type="checkbox" id="auto-render" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-item">
      <label for="theme">主题</label>
      <select id="theme">
        <option value="light">亮色</option>
        <option value="dark">暗色</option>
        <option value="auto">跟随系统</option>
        <option value="github">GitHub</option>
        <option value="vuepress">VuePress</option>
        <option value="gitbook">GitBook</option>
      </select>
    </div>

    <div class="setting-item">
      <label for="font-size">字体大小</label>
      <input type="range" id="font-size" min="12" max="24" value="16">
      <span id="font-size-value">16px</span>
    </div>

    <div class="setting-item">
      <label for="line-numbers">显示行号</label>
      <label class="switch">
        <input type="checkbox" id="line-numbers" checked>
        <span class="slider"></span>
      </label>
    </div>

    <hr>

    <div class="setting-item">
      <label for="plantuml-server">PlantUML 服务器</label>
      <select id="plantuml-server">
        <option value="auto">自动（官方 + 自定义）</option>
        <option value="official">官方服务器（国际）</option>
        <option value="custom">自定义服务器</option>
      </select>
    </div>

    <div class="setting-item" id="plantuml-custom-wrap" style="display:none;">
      <label for="plantuml-custom">自定义服务器地址</label>
      <input type="text" id="plantuml-custom" placeholder="https://your-server/plantuml" style="width:95%;font-size:12px;padding:4px;">
      <small style="color:#888;">格式：https://域名/plantuml（无需尾部斜杠）</small>
    </div>

    <hr>

    <button id="manual-render" class="btn primary">手动渲染当前页面</button>
    <button id="toggle-editor" class="btn secondary">切换编辑器模式</button>
    <button id="export-pdf" class="btn secondary">导出 PDF</button>
    <button id="reset" class="btn secondary">恢复原始页面</button>

    <div class="status" id="status"></div>

    <div class="shortcuts">
      <small>快捷键：Ctrl+Shift+R 渲染 | Ctrl+Shift+E 编辑器 | Ctrl+Shift+P 导出PDF</small>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
